name: Deploy VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v5

      - name: Deploy
        run: /usr/local/bin/deploy-cloud-drive.sh
